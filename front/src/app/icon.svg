<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <!-- 배경 (violet → pink 그라디언트, 라운드 코너) -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- 가면 몸체 -->
  <rect x="3" y="11" width="26" height="12" rx="5" fill="white" opacity="0.93"/>
  <!-- 왼쪽 눈 구멍 -->
  <ellipse cx="11" cy="17" rx="3.5" ry="3" fill="#7c3aed"/>
  <!-- 오른쪽 눈 구멍 -->
  <ellipse cx="21" cy="17" rx="3.5" ry="3" fill="#9d4edd"/>
  <!-- 눈 반짝임 -->
  <circle cx="12.2" cy="15.8" r="0.9" fill="white" opacity="0.7"/>
  <circle cx="22.2" cy="15.8" r="0.9" fill="white" opacity="0.7"/>
  <!-- 살짝 비뚤어진 미소 (라이어 느낌) -->
  <path d="M12 26 Q16.5 29.5 20.5 26.5" stroke="white" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.9"/>
</svg>
